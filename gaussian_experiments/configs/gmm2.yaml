# OOD Gaussian mixture FKC experiment (alternate 4-mode "cross" geometry).
#
# Same product/ratio target structure as configs/gmm.yaml but with a 4-mode
# layout: attr_a1 over the first two modes, attr_a2 over the last two, base
# over all four; std=1.0; ground-truth sampled via importance sampling.

gmm:
  # Component means as an (M, 2) list. Any M is supported, attr_a1 and attr_a2
  # are 0-based indices into this list.
  means:
    - [-6.0,  1.5]   # 0
    - [ 9.0,  0.0]   # 1
    - [ 0.0, -9.0]   # 2
    - [-1.5,  6.0]   # 3
  attr_a1: [0, 1]    # uniform over these components
  attr_a2: [2, 3]
  component_std: 1.0
  sampler: "is"     # "rejection" or "is" (importance sampling)

single_shot:
  seed: 1
  n_samples: 5000
  k_particles: 16
  n_steps: 500
  train_iters: 20000
  grid_range: 10.0
  fig_ext: ".pdf"
  training_size: 10000
  mode: "conditional"

sweep:
  seed: 1
  n_output: 5000
  n_runs: 30
  n_steps: 500
  train_iters: 20000
  grid_range: 10.0
  fig_ext: ".pdf"
  training_sizes: [100, 1000, 10000, "analytical"]
  particle_counts: [1, 4, 16, 64, 256]
  separate_models: false
