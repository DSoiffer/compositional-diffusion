# In-distribution Gaussian mixture FKC experiment.
#
# Three conditions (a1, a2, base), each an IsotropicGMM sharing the same means
# and std but with different component weights. The analytical target is the
# product a1 * a2 / base, which is in general not a GMM, so we sample it via
# rejection or importance sampling on the exact ratio density.

gmm:
  # Component means as an (M, 2) list. Any M is supported, attr_a1 and attr_a2
  # are 0-based indices into this list.
  means:
    - [-3.0,  2.5]   # 0
    - [ 0.0,  2.5]   # 1
    - [ 3.0,  2.5]   # 2
    - [-3.0, -2.5]   # 3
    - [ 0.0, -2.5]   # 4
    - [ 3.0, -2.5]   # 5
  attr_a1: [0, 1, 2, 3]    # uniform weight over these components
  attr_a2: [1, 2, 4, 5]
  component_std: 0.6
  sampler: "rejection"     # "rejection" or "is" (importance sampling)

single_shot:
  seed: 1
  n_samples: 5000
  k_particles: 16
  n_steps: 500
  train_iters: 20000
  training_size: 10000        # size of the fixed training pool drawn once per condition
  grid_range: 6.0
  fig_ext: ".pdf"
  mode: "conditional"         # "separate" (one model per condition) or "conditional" (one shared model)

sweep:
  seed: 1
  n_output: 5000
  n_runs: 30               # number of independent runs to average over
  n_steps: 500
  train_iters: 20000
  grid_range: 6.0
  fig_ext: ".pdf"
  separate_models: false    # set to false to train a single conditional model per cell
  training_sizes: [100, 1000, 10000, "analytical"]
  particle_counts: [1, 4, 16, 64, 256]
