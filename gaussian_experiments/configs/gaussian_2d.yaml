# 2D Gaussian FKC experiment.
#
# Three zero-mean diagonal Gaussians in 2D. The analytical target is the
# product a1 * a2 / base, which is itself a diagonal Gaussian.

gaussian_2d:
  variances_a1:   [10.0, 1.0]
  variances_a2:   [1.0,  10.0]
  variances_base: [1.0,  1.0]

# Single shot is mainly for visualizations with plots
single_shot:
  seed: 1
  n_samples: 5000          # output samples per FKC run
  k_particles: 16          # number of FKC particles
  n_steps: 500             # reverse SDE steps
  train_iters: 20000
  training_size: 10000     # size of the fixed training pool (per condition)
  grid_range: 12.0         # axis limits for scatter plots
  fig_ext: ".pdf"
  mode: "conditional"      # "conditional" (one conditional model) or "separate" (one model per condition)

# Sweep produces the tables presented in the paper
sweep:
  seed: 1
  n_output: 5000
  n_runs: 30               # number of independent runs to average over
  n_steps: 500
  train_iters: 20000
  grid_range: 12.0
  fig_ext: ".pdf"
  separate_models: false   # set to true to train separate models, instead of one conditional model
  training_sizes: [100, 1000, 10000, "analytical"] #  "analytical" performs no training, instead using the analytical scores
  particle_counts: [1, 4, 16, 64, 256]
